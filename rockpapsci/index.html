<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock paper scissor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock paper scissors</h1>
    <div class="choices" >
        <div class="choice" id="rock">
            <h4>Rock</h4>
        </div>
        <div class="choice" id="paper">
            <h4>Paper</h4>
        </div>
        <div class="choice" id="scissor">
            <h4>Scissor</h4>
        </div>
    </div>
    <div class="score">
        <div class="sc">
            <p id="user-score">0</p>
            <p>You</p>
        </div>
        <div class="sc">
            <p id="comp-score">0</p>
            <p>Comp</p>
        </div>
    </div>
    <div class="msg">
        <p id="m">Play your move</p>
    </div>
    <script src="index.js"></script>
    
</body>
</html>
