<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quizc">
        <h2 id="quizq">Question Tag</h2>
        <ul>
            <li>
                <input type="radio" class="answer" id="option1" name="quiz-op">
                <label for="option1" id="text_option1">Option 1</label>
            </li>
            <li>
                <input type="radio" class="answer" id="option2" name="quiz-op">
                <label for="option2" id="text_option2">Option 2</label>
            </li>
            <li>
                <input type="radio" class="answer" id="option3" name="quiz-op">
                <label for="option3" id="text_option3">Option 3</label>
            </li>
            <li>
                <input type="radio" class="answer" id="option4" name="quiz-op">
                <label for="option4" id="text_option4">Option 4</label>
            </li>
        </ul>
        <button id="submit">Submit </button>
    </div>
    <script src="index.js"></script>
</body>
</html>
