<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Password Generator</h2>

        </div>
        <div class="display">
            <input type="text" id="pass-input" placeholder="Password" disabled>
            <button id="copy">Copy</button>
        </div>
        <div class="setting">
            <label  class="length-label">Length</label>
            <input type="number" id="lenno" value="10" min="10" max="10" step="1" >
        </div>
        <div class="setting">
            <label  class="uc-label">Upper Case</label>
            <input type="checkbox" id="uc"  checked  >
        </div>
        <div class="setting">
            <label  class="lc-label">Lower case</label>
            <input type="checkbox" id="lc"  checked>
        </div>
        <div class="setting">
            <label  class="num-label">Numbers</label>
            <input type="checkbox" id="num" checked >
        </div>
        <div class="setting">
            <label  class="sc-label">Special Characters</label>
            <input type="checkbox" id="sc" checked >
        </div>
        <div class="genbtn">
            <button id="gen">Generate</button>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
